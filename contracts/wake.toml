# Wake Configuration for Credit Rail Fuzzing

[compiler.solc]
version = "0.8.27"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts/",
    "@poseidon2-evm/=lib/poseidon2-evm/src/",
    "forge-std/=lib/forge-std/src/"
]
exclude_paths = ["src-zk/", "script/", "lib/", "node_modules/"]
via_IR = true

[compiler.solc.optimizer]
enabled = true
runs = 100

[testing.fuzzing]
sequences_count = 1000
flows_count = 100
