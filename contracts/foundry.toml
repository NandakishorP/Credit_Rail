[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.30"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true
evm_version = "cancun"
fallback_oz = true
mode = "3"
gas_price = 0
block_gas_limit = 100000000
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts",
    "@poseidon2-evm/=lib/poseidon2-evm/src/",
    "halmos-cheatcodes/=lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/"
]
# Exclude scripts and non-foundry fuzz tests from default profile
ignore = ["script/*", "test/medusa/*", "test/fuzz/echidna/*", "tests/*"]

[fuzz]
runs = 1000
seed = "0x2"

[invariant]
runs = 2000
depth = 128
fail_on_revert = true

[profile.zksync]
src = "src"
out = "zkout"
libs = ["lib"]
test = "test-zk-disabled"
script = "script-zk-disabled"
solc = "0.8.30"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true
evm_version = "cancun"
zksync = true
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts",
    "@poseidon2-evm/=lib/poseidon2-evm/src/"
]

[profile.halmos]
src = "src"
out = "halmos-out"
libs = ["lib"]
test = "test/halmos"
script = "script-disabled"
solc = "0.8.30"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts",
    "@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts",
    "@poseidon2-evm/=lib/poseidon2-evm/src/",
    "halmos-cheatcodes/=lib/openzeppelin-contracts/lib/halmos-cheatcodes/src/"
]
